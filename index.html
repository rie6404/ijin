<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="偉人暗記">
<meta name="theme-color" content="#fbf7f2">
<title>女性偉人 暗記＆検定クイズ</title>
<style>
  :root{
    --bg:#fbf7f2; --card:#ffffff; --ink:#3a3330; --sub:#8a7f78;
    --line:#ece3da; --plum:#9c5a73; --plum-soft:#f3e4ea;
    --leaf:#6b8e6e; --leaf-soft:#e6efe6; --gold:#caa45a;
    --red:#c2616a; --red-soft:#f6e3e4;
    --shadow:0 6px 20px rgba(120,90,80,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.7;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:520px;margin:0 auto;padding:16px 18px 44px;}

  header{padding:6px 0 12px;}
  .title{font-size:19px;font-weight:700;letter-spacing:.02em;}
  .title small{display:block;font-size:11.5px;font-weight:500;color:var(--sub);margin-top:2px;letter-spacing:.04em;}
  .countdown{
    margin-top:12px;background:linear-gradient(120deg,#9c5a73,#b9748b);
    color:#fff;border-radius:16px;padding:11px 16px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:8px;
  }
  .countdown .lbl{font-size:12px;opacity:.9;}
  .countdown .num{font-size:28px;font-weight:800;line-height:1;}
  .countdown .day{font-size:13px;opacity:.9;}
  .countdown .exam{margin-left:auto;font-size:11px;opacity:.85;text-align:right;line-height:1.5;}

  .stats{display:flex;gap:7px;margin-top:12px;}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px 3px;text-align:center;}
  .stat .v{font-size:18px;font-weight:700;}
  .stat .k{font-size:10px;color:var(--sub);margin-top:1px;}
  .resume-line{font-size:11.5px;color:var(--leaf);text-align:center;margin-top:9px;min-height:1px;}
  .saverow{display:flex;align-items:center;gap:10px;margin-top:11px;}
  .savebtn{flex:none;border:0;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;
    background:var(--leaf);color:#fff;cursor:pointer;box-shadow:var(--shadow);transition:.15s;}
  .savebtn.dirty{background:var(--plum);}
  .savebtn:active{transform:scale(.98);}
  .savestatus{font-size:12px;color:var(--sub);line-height:1.4;}
  .savestatus.ok{color:#3f5d41;}
  .savestatus.warn{color:var(--plum);}
  .bar{height:7px;border-radius:99px;background:var(--line);margin-top:9px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#6b8e6e,#86ab89);width:0;transition:width .4s;}

  /* mode tabs */
  .tabs{display:flex;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px;margin-top:16px;}
  .tabs button{flex:1;border:0;background:transparent;color:var(--sub);font-size:14px;font-weight:700;
    padding:10px 4px;border-radius:10px;cursor:pointer;transition:.15s;}
  .tabs button.on{background:var(--plum);color:#fff;}

  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:3px;flex:1;min-width:0;}
  .seg button{flex:1;border:0;background:transparent;color:var(--sub);font-size:12px;font-weight:600;
    padding:8px 4px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .seg button.on{background:var(--plum);color:#fff;}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:12px;
    padding:0 14px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .iconbtn.on{background:var(--leaf-soft);border-color:#c9ddc9;color:#3f5d41;}

  .progress-txt{font-size:11.5px;color:var(--sub);text-align:center;margin:14px 0 8px;}

  /* ---- card mode ---- */
  .deckwrap{perspective:1400px;}
  .card{position:relative;width:100%;min-height:226px;cursor:pointer;
    transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,.1,.2,1);}
  .card.flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);
    padding:26px 24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
  .face.back{transform:rotateY(180deg);}
  .face .tag{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--gold);
    border:1px solid #ecdcb6;background:#fbf4e3;border-radius:99px;padding:3px 11px;margin-bottom:14px;}
  .face .field{font-size:11px;color:var(--sub);margin-bottom:6px;}
  .face .main{font-size:24px;font-weight:700;}
  .face .main.small{font-size:17px;font-weight:600;line-height:1.6;}
  .face .hint{position:absolute;bottom:13px;font-size:11px;color:#c3b8b0;}

  .answers{display:flex;gap:10px;margin-top:16px;}
  .ans{flex:1;border:0;border-radius:14px;padding:14px 0;font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
  .ans.no{background:var(--plum-soft);color:var(--plum);}
  .ans.yes{background:var(--leaf-soft);color:#3f5d41;}

  /* ---- quiz mode ---- */
  .qbox{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:20px 18px;}
  .qkind{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;padding:3px 11px;border-radius:99px;margin-bottom:12px;}
  .qkind.ok{background:var(--leaf-soft);color:#3f5d41;}
  .qkind.ng{background:var(--red-soft);color:var(--red);}
  .qstem{font-size:16px;font-weight:700;line-height:1.6;margin-bottom:16px;}
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{display:flex;gap:10px;text-align:left;width:100%;border:1.5px solid var(--line);background:#fff;
    border-radius:14px;padding:13px 14px;font-size:13.5px;line-height:1.6;cursor:pointer;color:var(--ink);transition:.12s;}
  .opt .mk{flex:none;width:22px;height:22px;border-radius:50%;background:var(--plum-soft);color:var(--plum);
    font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .opt:active{transform:scale(.99);}
  .opt.correct{border-color:#9cc39e;background:var(--leaf-soft);}
  .opt.correct .mk{background:#6b8e6e;color:#fff;}
  .opt.wrong{border-color:#dfa3a8;background:var(--red-soft);}
  .opt.wrong .mk{background:var(--red);color:#fff;}
  .opt.dim{opacity:.55;}
  .opt:disabled{cursor:default;}

  .explain{margin-top:14px;border-radius:14px;padding:14px 15px;background:#f6f1ea;border:1px solid var(--line);display:none;}
  .explain.show{display:block;animation:rise .35s ease;}
  .explain .eh{font-size:12px;font-weight:700;margin-bottom:5px;}
  .explain .eh.ok{color:#3f5d41;} .explain .eh.ng{color:var(--red);}
  .explain .et{font-size:13px;color:#4a423d;line-height:1.7;}
  .nextq{margin-top:14px;width:100%;border:0;border-radius:14px;padding:14px 0;font-size:14.5px;font-weight:700;
    background:var(--plum);color:#fff;cursor:pointer;box-shadow:var(--shadow);display:none;}
  .nextq.show{display:block;}

  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
  .navrow button{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 14px;font-size:13px;color:var(--sub);cursor:pointer;}
  .navrow .center{font-size:12px;color:var(--sub);}

  .cheer{margin-top:18px;border-radius:18px;padding:16px 18px;display:none;background:var(--leaf-soft);border:1px solid #cfe0cf;}
  .cheer.show{display:block;animation:rise .4s ease;}
  .cheer .ct{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--leaf);margin-bottom:5px;}
  .cheer .cm{font-size:14.5px;color:#3f5d41;line-height:1.7;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .empty{text-align:center;color:var(--sub);padding:46px 20px;font-size:14px;}
  .done{text-align:center;padding:28px 18px;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);}
  .done .big{font-size:18px;font-weight:700;margin-bottom:8px;}
  .done .lead{font-size:14px;color:var(--sub);line-height:1.8;}
  .done button{margin-top:18px;background:var(--plum);color:#fff;border:0;border-radius:14px;padding:13px 26px;font-size:14px;font-weight:700;cursor:pointer;}

  .resetrow{margin-top:28px;text-align:center;}
  .resetrow button{background:none;border:0;color:#c3b8b0;font-size:12px;text-decoration:underline;cursor:pointer;}
  footer{text-align:center;font-size:11px;color:#cabfb7;margin-top:22px;line-height:1.7;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">女性偉人 暗記＆検定クイズ<small>女性活躍検定 第2部・時代を切り開いた女性たち</small></div>
    <div class="countdown">
      <div><span class="lbl">受験日まであと</span><br><span class="num" id="cdNum">--</span> <span class="day">日</span></div>
      <div class="exam">女性活躍検定<br>2026/8/30（日）</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="v" id="stMastered">0</div><div class="k">覚えた</div></div>
      <div class="stat"><div class="v" id="stRate">--%</div><div class="k">正答率</div></div>
      <div class="stat"><div class="v" id="stLaps">0</div><div class="k">周回</div></div>
      <div class="stat"><div class="v" id="stAnswered">0</div><div class="k">累計問題</div></div>
    </div>
    <div class="bar"><i id="bar"></i></div>
    <div class="resume-line" id="resumeLine"></div>
    <div class="saverow">
      <button id="saveBtn" class="savebtn">保存して終了</button>
      <span class="savestatus" id="saveStatus"></span>
    </div>
  </header>

  <div class="tabs" id="modeTabs">
    <button data-mode="card" class="on">暗記カード</button>
    <button data-mode="quiz">検定クイズ</button>
  </div>

  <!-- shared pool/shuffle controls -->
  <div class="controls" id="cardCtrls">
    <div class="seg" id="dirSeg" style="flex:2">
      <button data-dir="n2a" class="on">名前→功績</button>
      <button data-dir="a2n">功績→名前</button>
    </div>
    <button class="iconbtn on" id="shuffleBtn">シャッフル</button>
  </div>
  <div class="controls">
    <div class="seg" id="poolSeg">
      <button data-pool="all" class="on">全員</button>
      <button data-pool="weak">苦手だけ</button>
      <button data-pool="unseen">未学習</button>
    </div>
  </div>

  <div class="progress-txt" id="progressTxt"></div>

  <!-- CARD MODE -->
  <div id="cardMode">
    <div class="deckwrap">
      <div class="card" id="card">
        <div class="face front">
          <span class="tag" id="frontTag">名前</span>
          <div class="field" id="frontField"></div>
          <div class="main" id="frontMain">読み込み中…</div>
          <div class="hint">タップで答えを見る</div>
        </div>
        <div class="face back">
          <span class="tag" id="backTag">功績</span>
          <div class="field" id="backField"></div>
          <div class="main small" id="backMain"></div>
          <div class="hint">タップで戻る</div>
        </div>
      </div>
    </div>
    <div class="answers">
      <button class="ans no" id="ansNo">まだ</button>
      <button class="ans yes" id="ansYes">覚えた</button>
    </div>
  </div>

  <!-- QUIZ MODE -->
  <div id="quizMode" style="display:none">
    <div class="qbox">
      <span class="qkind" id="qKind"></span>
      <div class="qstem" id="qStem"></div>
      <div class="opts" id="qOpts"></div>
      <div class="explain" id="qExplain">
        <div class="eh" id="qeHead"></div>
        <div class="et" id="qeText"></div>
      </div>
      <button class="nextq" id="qNext">次の問題へ</button>
    </div>
  </div>

  <div class="navrow" id="navRow">
    <button id="prevBtn">← 前</button>
    <span class="center" id="posTxt"></span>
    <button id="nextBtn">次 →</button>
  </div>

  <div class="cheer" id="cheer">
    <div class="ct" id="cheerType"></div>
    <div class="cm" id="cheerMsg"></div>
  </div>

  <div class="resetrow"><button id="resetBtn">学習記録をリセット</button></div>
  <footer>
    データはこの端末・ブラウザ内だけに保存されます（クラウド同期なし）。<br>
    ホーム画面に追加すると、アプリのように使えます。
  </footer>
</div>

<script>

/* ===== カウントダウン ===== */
const EXAM_DATE = new Date(2026,7,30);
function daysLeft(){
  const now=new Date();
  const a=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const b=new Date(EXAM_DATE.getFullYear(),EXAM_DATE.getMonth(),EXAM_DATE.getDate());
  return Math.max(0,Math.round((b-a)/86400000));
}

/* ===== 保存（手動セーブ方式） =====
   普段はメモリ上のデータ(store / progress)を更新するだけ。
   実際にlocalStorageへ書き込むのは「保存ボタン」を押したとき(commitSave)のみ。
   消えにくくするため、localStorage と sessionStorage の両方＋予備キーに書く。 */
const KEY="ijin_anki_v2";
const PKEY="ijin_anki_progress_v1";
const KEY_BAK="ijin_anki_v2_bak";
const PKEY_BAK="ijin_anki_progress_v1_bak";
function readKey(primary,backup){
  for(const k of [primary,backup]){
    try{ const v=localStorage.getItem(k); if(v) return JSON.parse(v); }catch(e){}
    try{ const v=sessionStorage.getItem(k); if(v) return JSON.parse(v); }catch(e){}
  }
  return null;
}
function load(){ return readKey(KEY,KEY_BAK)||{}; }
function loadProgress(){ return readKey(PKEY,PKEY_BAK)||{}; }
let store=load();
function rec(name){ if(!store[name]) store[name]={mastered:false,right:0,wrong:0,seen:false}; return store[name]; }
let progress=loadProgress();
if(progress.totalAnswered==null) progress.totalAnswered=0;  // 累計回答数
if(progress.laps==null) progress.laps=0;                    // 周回数（完走した回数）

let dirty=false;  // 未保存の変更があるか
function markDirty(){ dirty=true; updateSaveBtn(); }
function updateSaveBtn(savedOk){
  const btn=document.getElementById('saveBtn');
  const st=document.getElementById('saveStatus');
  if(!btn||!st) return;
  if(savedOk===true){
    btn.classList.remove('dirty'); btn.textContent="保存ずみ";
    st.className="savestatus ok";
    st.textContent="保存しました（"+(pos)+"問終了・"+(progress.totalAnswered||0)+"問達成）。閉じてOKです。";
  }else if(savedOk===false){
    st.className="savestatus warn";
    st.textContent="保存できませんでした。もう一度押してみてください。";
  }else if(dirty){
    btn.classList.add('dirty'); btn.textContent="保存して終了";
    st.className="savestatus warn"; st.textContent="未保存の進みがあります";
  }else{
    btn.classList.remove('dirty'); btn.textContent="保存して終了";
    st.className="savestatus"; st.textContent="";
  }
}

function writeAll(k,kb,obj){
  const s=JSON.stringify(obj);
  let ok=false;
  try{ localStorage.setItem(k,s); localStorage.setItem(kb,s); ok=true; }catch(e){}
  try{ sessionStorage.setItem(k,s); sessionStorage.setItem(kb,s); }catch(e){}
  return ok;
}
/* 実際の書き込み（保存ボタンから呼ぶ） */
function commitSave(){
  progress.mode=mode; progress.pool=pool; progress.dir=dir;
  progress.shuffleOn=shuffleOn; progress.order=order; progress.pos=pos;
  progress.lastDate=new Date().toISOString();
  let ok=true;
  ok = writeAll(KEY,KEY_BAK,store) && ok;
  ok = writeAll(PKEY,PKEY_BAK,progress) && ok;
  try{ JSON.parse(localStorage.getItem(PKEY)); }catch(e){ ok=false; } // 読み戻し確認
  if(ok){ dirty=false; }
  updateSaveBtn(ok);
  return ok;
}

/* ===== 状態 ===== */
let mode=progress.mode||"card";          // card / quiz
let dir=progress.dir||"n2a";
let pool=progress.pool||"all";
let shuffleOn=(progress.shuffleOn!=null)?progress.shuffleOn:true;
let order=[];
let pos=0;
let answeredThisRound=0;
let quiz=null;            // 現在のクイズ問題
let quizLocked=false;
let doneCounted=false;    // この周の完走を二重カウントしないため

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* 出題順を組む。resume=true なら前回の保存地点（order/pos）を復元 */
function buildPool(resume){
  if(resume && Array.isArray(progress.order) && progress.order.length>0
     && progress.pool===pool && progress.order.every(i=>i<IJIN.length)){
    order=progress.order.slice();
    pos=Math.min(progress.pos||0, order.length);
    answeredThisRound=0;
    return;
  }
  let idx=IJIN.map((_,i)=>i);
  if(pool==="weak") idx=idx.filter(i=>{const r=store[IJIN[i].name]; return r&&!r.mastered&&r.wrong>0;});
  else if(pool==="unseen") idx=idx.filter(i=>{const r=store[IJIN[i].name]; return !r||!r.seen;});
  if(shuffleOn) shuffle(idx);
  order=idx; pos=0; answeredThisRound=0;
}

/* ===== 共通描画 ===== */
const card=document.getElementById('card');
function setFlip(f){ card.classList.toggle('flip',f); }

function render(){
  document.getElementById('cdNum').textContent=daysLeft();
  updateStats();
  // モード別の表示切替
  document.getElementById('cardMode').style.display = mode==="card"?"":"none";
  document.getElementById('quizMode').style.display = mode==="quiz"?"":"none";
  document.getElementById('cardCtrls').style.display = mode==="card"?"":"none";

  clearOverlays();

  if(order.length===0){ showEmpty(); return; }
  if(pos>=order.length){ showDone(); return; }

  // セットの途中にいる間は「完走カウント」を解除しておく
  if(pos<order.length) doneCounted=false;

  document.getElementById('navRow').style.display='flex';
  document.getElementById('posTxt').textContent=(pos+1)+" / "+order.length;
  document.getElementById('progressTxt').textContent=
    (pool==="all"?"全員":pool==="weak"?"苦手だけ":"未学習")+"・"+
    (mode==="card"?(dir==="n2a"?"名前→功績":"功績→名前"):"検定形式クイズ");

  // 続きから再開している場合のひとことガイド
  const rl=document.getElementById('resumeLine');
  if(pos>0){ rl.textContent="前回の続き："+(pos)+"問終了 → "+(pos+1)+"問目から再開中"; }
  else { rl.textContent=""; }

  if(mode==="card") renderCard(); else renderQuiz();
}

function clearOverlays(){
  document.querySelectorAll('.empty,.done').forEach(e=>e.remove());
}

function updateStats(){
  const total=IJIN.length; let mastered=0,right=0,wrong=0;
  IJIN.forEach(p=>{const r=store[p.name]; if(r){ if(r.mastered)mastered++; right+=r.right||0; wrong+=r.wrong||0; }});
  document.getElementById('stMastered').textContent=mastered+"/"+total;
  document.getElementById('stLaps').textContent=(progress.laps||0);
  document.getElementById('stAnswered').textContent=(progress.totalAnswered||0);
  const rate=(right+wrong)>0?Math.round(right/(right+wrong)*100):null;
  document.getElementById('stRate').textContent=rate===null?"--%":rate+"%";
  document.getElementById('bar').style.width=total?(mastered/total*100)+"%":"0%";
}

/* ===== カードモード ===== */
function renderCard(){
  document.getElementById('cardMode').style.display='';
  const item=IJIN[order[pos]];
  const front=document.getElementById('frontMain'), back=document.getElementById('backMain');
  const ff=document.getElementById('frontField'), bf=document.getElementById('backField');

    document.getElementById('frontTag').textContent="名前";
    document.getElementById('backTag').textContent="功績";
    front.className="main"; front.textContent=item.name; ff.textContent=item.reading||"";
    back.className="main small"; back.textContent=item.deeds; bf.textContent=item.field?("分野："+item.field):"";
  }else{
    document.getElementById('frontTag').textContent="功績";
    document.getElementById('backTag').textContent="名前";
    front.className="main small"; front.textContent=item.deeds; ff.textContent=item.field?("分野："+item.field):"";
    back.className="main"; back.textContent=item.name; bf.textContent=item.reading||"";
  }
  setFlip(false);
}
function answerCard(ok){
  const item=IJIN[order[pos]]; const r=rec(item.name);
  r.seen=true; if(ok){r.right++;r.mastered=true;}else{r.wrong++;r.mastered=false;}
  markDirty(); afterAnswer();
}

/* ===== クイズモード ===== */
/* 検定の核：その人の功績を、他の人物の功績と取り違えずに選べるか。
   選択肢は常に「4人ぶんの具体的な功績文」。正しい1つ（本人）を選ぶ。
   分野などのヒントは一切出さない。 */
function makeQuiz(centerIdx){
  const center=IJIN[centerIdx];
  const others=IJIN.map((_,i)=>i).filter(i=>i!==centerIdx);
  shuffle(others);
  const distract=others.slice(0,3).map(i=>({text:IJIN[i].deeds,who:IJIN[i].name,correct:false}));
  let opts=[{text:center.deeds,who:center.name,correct:true},...distract];
  shuffle(opts);
  return {centerIdx,center,opts};
}
function renderQuiz(){
  quizLocked=false;
  quiz=makeQuiz(order[pos]);
  const kindEl=document.getElementById('qKind');
  kindEl.className="qkind ok";
  kindEl.textContent="正しい説明を選ぶ";
  document.getElementById('qStem').textContent =
    quiz.center.name+"の説明として、最も適切なものを選びなさい。";
  const wrap=document.getElementById('qOpts'); wrap.innerHTML="";
  const marks=["ア","イ","ウ","エ"];
  quiz.opts.forEach((o,i)=>{
    const b=document.createElement('button'); b.className="opt";
    b.innerHTML='<span class="mk">'+marks[i]+'</span><span>'+o.text+'</span>';
    b.onclick=()=>pickQuiz(i,b);
    wrap.appendChild(b);
  });
  const ex=document.getElementById('qExplain'); ex.classList.remove('show');
  document.getElementById('qNext').classList.remove('show');
}
function pickQuiz(i,btn){
  if(quizLocked) return; quizLocked=true;
  const chosen=quiz.opts[i];
  const isRight=chosen.correct; // 「選ぶべきもの」を選べたか
  // 全選択肢に色付け
  const btns=document.querySelectorAll('#qOpts .opt');
  quiz.opts.forEach((o,idx)=>{
    btns[idx].disabled=true;
    if(o.correct) btns[idx].classList.add('correct');         // 選ぶべき＝正解扱いで緑
    else btns[idx].classList.add('dim');
  });
  if(!isRight){ btn.classList.remove('dim'); btn.classList.add('wrong'); }
  // 記録（中心人物に対して）
  const r=rec(quiz.center.name); r.seen=true;
  if(isRight){r.right++; if(!r.wrong||r.wrong<=r.right)r.mastered=true;} else {r.wrong++; r.mastered=false;}
  markDirty();
  // 解説
  const ex=document.getElementById('qExplain');
  const head=document.getElementById('qeHead'), text=document.getElementById('qeText');
  if(isRight){
    head.className="eh ok"; head.textContent="正解！";
    text.textContent = quiz.center.name+"の説明として正しいのはこれです。"+(quiz.center.note?("　"+quiz.center.note):"");
  }else{
    head.className="eh ng"; head.textContent="おしい！";
    text.textContent = "あなたが選んだのは"+chosen.who+"の説明です。正しいのは緑の選択肢（"+quiz.center.name+"）でした。";
  }
  ex.classList.add('show');
  document.getElementById('qNext').classList.add('show');
  afterAnswer(true);
}
function truncate(s){ return s.length>16 ? s.slice(0,16)+"…" : s; }

/* ===== 回答後の共通処理（励まし・進行） ===== */
function afterAnswer(quizMode){
  answeredThisRound++;
  progress.totalAnswered=(progress.totalAnswered||0)+1;  // 累計回答数
  markDirty();
  updateStats();
  if(answeredThisRound%10===0){ showCheer(quizMode); }   // 10問ごとに励まし
  else if(!quizMode){ next(); }   // カードは即送り。クイズは「次へ」ボタンで送る
}
function showCheer(quizMode){
  const types=Object.keys(CHEERS); const t=types[Math.floor(Math.random()*types.length)];
  const arr=CHEERS[t].list; const m=arr[Math.floor(Math.random()*arr.length)];
  const box=document.getElementById('cheer');
  document.getElementById('cheerType').textContent=CHEERS[t].label;
  document.getElementById('cheerMsg').textContent=m;
  box.classList.add('show');
  if(!quizMode){ setTimeout(()=>{box.classList.remove('show'); next();},2600); }
}
function hideCheer(){ document.getElementById('cheer').classList.remove('show'); }

function next(){ hideCheer(); if(pos<order.length) pos++; markDirty(); render(); }
function prev(){ hideCheer(); if(pos>0) pos--; markDirty(); render(); }

function showEmpty(){
  document.getElementById('navRow').style.display='none';
  document.getElementById('cardMode').style.display='none';
  document.getElementById('quizMode').style.display='none';
  const d=document.createElement('div'); d.className='empty';
  d.textContent = pool==="weak" ? "苦手な偉人はまだありません。「全員」で進めてみましょう。"
                 : pool==="unseen" ? "未学習の偉人はありません。全員ひと通り見ました！"
                 : "偉人データがまだ入っていません。";
  document.querySelector('.wrap').insertBefore(d, document.getElementById('navRow'));
}
function showDone(){
  document.getElementById('navRow').style.display='none';
  document.getElementById('cardMode').style.display='none';
  document.getElementById('quizMode').style.display='none';
  hideCheer();
  // 1周完走 → 周回数を加算（このセットにつき一度だけ）
  if(!doneCounted){ progress.laps=(progress.laps||0)+1; doneCounted=true; markDirty(); updateStats(); }
  const d=document.createElement('div'); d.className='done';
  d.innerHTML='<div class="big">'+(progress.laps)+'周目を達成！</div>'+
    '<div class="lead">りえさん、おつかれさまでした。<br>これまでの累計は'+(progress.totalAnswered||0)+'問。受験日まであと'+daysLeft()+'日。<br>合格証を開く日の自分を思い浮かべて、もうひと回りいきますか？</div>'+
    '<button id="againBtn">次の周を始める（シャッフル）</button>';
  document.querySelector('.wrap').insertBefore(d, document.getElementById('navRow'));
  document.getElementById('againBtn').onclick=()=>{ doneCounted=false; buildPool(false); render(); };
}

/* ===== イベント ===== */
card.addEventListener('click',()=>setFlip(!card.classList.contains('flip')));
document.getElementById('ansYes').onclick=()=>answerCard(true);
document.getElementById('ansNo').onclick=()=>answerCard(false);
document.getElementById('qNext').onclick=()=>{ next(); };
document.getElementById('nextBtn').onclick=()=>next();
document.getElementById('prevBtn').onclick=()=>prev();

document.getElementById('modeTabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#modeTabs button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); mode=b.dataset.mode; doneCounted=false; buildPool(false); render();
});
document.getElementById('dirSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#dirSeg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); dir=b.dataset.dir; markDirty(); render();
});
document.getElementById('poolSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#poolSeg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); pool=b.dataset.pool; doneCounted=false; buildPool(false); markDirty(); render();
});
document.getElementById('shuffleBtn').onclick=function(){
  shuffleOn=!shuffleOn; this.classList.toggle('on',shuffleOn);
  this.textContent=shuffleOn?"シャッフル":"順番どおり"; doneCounted=false; buildPool(false); markDirty(); render();
};
document.getElementById('resetBtn').onclick=()=>{
  if(confirm("覚えた記録・正答率・周回数・累計問題数をすべて消します。よろしいですか？")){
    store={};
    progress={totalAnswered:0, laps:0};
    doneCounted=false; buildPool(false); commitSave(); render();
  }
};

/* 保存ボタン：押したときだけ実書き込み */
document.getElementById('saveBtn').onclick=()=>{ commitSave(); };

/* ===== 起動：保存済みの設定をUIに反映し、続きから再開 ===== */
function syncUI(){
  document.querySelectorAll('#modeTabs button').forEach(x=>x.classList.toggle('on',x.dataset.mode===mode));
  document.querySelectorAll('#dirSeg button').forEach(x=>x.classList.toggle('on',x.dataset.dir===dir));
  document.querySelectorAll('#poolSeg button').forEach(x=>x.classList.toggle('on',x.dataset.pool===pool));
  const sb=document.getElementById('shuffleBtn');
  sb.classList.toggle('on',shuffleOn); sb.textContent=shuffleOn?"シャッフル":"順番どおり";
}
syncUI();
buildPool(true);   // 前回の続きから
dirty=false; updateSaveBtn();  // 起動直後は「未保存」状態をクリア
render();
</script>
</body>
</html>
